name: Fetch All Sources

on:
  schedule:
    - cron: "10 9 * * *" # 每天 UTC 09:10 统一执行（北京时间 17:10）
  workflow_dispatch:
    inputs:
      force_run:
        description: "忽略现有数据检查，强制执行全部来源抓取"
        required: false
        default: false
        type: boolean
      allow_main_dispatch:
        description: "允许在 main 分支手动执行（默认 false，仅紧急时打开）"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: fetch-all-sources-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch-all-sources:
    runs-on: ubuntu-latest
    env:
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      OPENAI_MODEL_ALTERNATE_1: ${{ vars.OPENAI_MODEL_ALTERNATE_1 }}
      OPENAI_MODEL_ALTERNATE_2: ${{ vars.OPENAI_MODEL_ALTERNATE_2 }}
      OPENAI_REQUEST_TIMEOUT: ${{ vars.OPENAI_REQUEST_TIMEOUT }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip list

    - name: Debug workflow context
      run: |
        echo "event_name=${{ github.event_name }}"
        echo "repository=${{ github.repository }}"
        echo "ref_name=${{ github.ref_name }}"
        echo "actor=${{ github.actor }}"

    - name: Protect main from manual test runs
      if: ${{ github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && github.event.inputs.allow_main_dispatch != 'true' }}
      run: |
        echo "Manual dispatch on main is blocked by default."
        echo "Please run this workflow on dev/test branch, or set allow_main_dispatch=true only for emergencies."
        exit 1

    - name: Validate required secrets
      id: secrets
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || vars.OPENAI_API_KEY }}
        PRODUCTHUNT_DEVELOPER_TOKEN: ${{ secrets.PRODUCTHUNT_DEVELOPER_TOKEN || vars.PRODUCTHUNT_DEVELOPER_TOKEN }}
      run: |
        if [ -z "${OPENAI_API_KEY}" ]; then
          echo "ERROR: OPENAI_API_KEY is required."
          exit 1
        fi

        if [ -z "${PRODUCTHUNT_DEVELOPER_TOKEN}" ]; then
          echo "ERROR: PRODUCTHUNT_DEVELOPER_TOKEN is required."
          exit 1
        fi

        echo "has_openai=true" >> "${GITHUB_OUTPUT}"
        echo "has_ph_token=true" >> "${GITHUB_OUTPUT}"

    - name: Pre-check existing data by source and date
      id: precheck
      env:
        FORCE_RUN: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.force_run == 'true') && 'true' || 'false' }}
      run: |
        python - <<'PY'
        import os
        from datetime import datetime, timedelta, timezone

        now = datetime.now(timezone.utc)
        today = now.strftime("%Y-%m-%d")
        yesterday = (now - timedelta(days=1)).strftime("%Y-%m-%d")
        force_run = os.getenv("FORCE_RUN", "false").lower() == "true"
        yesterday_weekday = (now - timedelta(days=1)).weekday()
        targets = {
            # Product Hunt 数据窗口取昨天，但写入按今天聚合，确保当日页三源齐全。
            "producthunt": {"fetch_date": yesterday, "output_date": today},
            # arXiv 抓前一天、写当天。arXiv 当天在 workflow 执行时点经常尚未出齐，直接抓当天容易空。
            "arxiv": {"fetch_date": yesterday, "output_date": today},
            "github": {"fetch_date": today, "output_date": today},
            "clawhub": {"fetch_date": today, "output_date": today},
        }

        outputs = {}
        for source, cfg in targets.items():
            fetch_date = cfg["fetch_date"]
            output_date = cfg["output_date"]
            outputs[f"{source}_fetch_date"] = fetch_date
            outputs[f"{source}_output_date"] = output_date
            # arXiv 在目标抓取日为周末时跳过。周末常常无新论文，强行抓取会导致整个 workflow 失败。
            skip = False
            if source == "arxiv" and yesterday_weekday >= 5 and not force_run:
                skip = True
            outputs[f"skip_{source}"] = "true" if skip else "false"
            action = "skip" if skip else "run"
            print(
                f"{source}: fetch_date={fetch_date}, output_date={output_date}, action={action}, force_run={force_run}"
            )

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            for key, value in outputs.items():
                f.write(f"{key}={value}\n")
        PY

    - name: Debug precheck outputs
      run: |
        echo "producthunt_fetch_date=${{ steps.precheck.outputs.producthunt_fetch_date }}"
        echo "producthunt_output_date=${{ steps.precheck.outputs.producthunt_output_date }}"
        echo "skip_producthunt=${{ steps.precheck.outputs.skip_producthunt }}"
        echo "arxiv_fetch_date=${{ steps.precheck.outputs.arxiv_fetch_date }}"
        echo "arxiv_output_date=${{ steps.precheck.outputs.arxiv_output_date }}"
        echo "skip_arxiv=${{ steps.precheck.outputs.skip_arxiv }}"
        echo "github_output_date=${{ steps.precheck.outputs.github_output_date }}"
        echo "skip_github=${{ steps.precheck.outputs.skip_github }}"
        echo "clawhub_fetch_date=${{ steps.precheck.outputs.clawhub_fetch_date }}"
        echo "clawhub_output_date=${{ steps.precheck.outputs.clawhub_output_date }}"
        echo "skip_clawhub=${{ steps.precheck.outputs.skip_clawhub }}"

    - name: Fetch Product Hunt
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || vars.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL }}
        PRODUCTHUNT_DEVELOPER_TOKEN: ${{ secrets.PRODUCTHUNT_DEVELOPER_TOKEN || vars.PRODUCTHUNT_DEVELOPER_TOKEN }}
        PRODUCTHUNT_FETCH_DATE: ${{ steps.precheck.outputs.producthunt_fetch_date }}
        PRODUCTHUNT_OUTPUT_DATE: ${{ steps.precheck.outputs.producthunt_output_date }}
      run: |
        python scripts/product_hunt_list_to_md.py

    - name: Fetch arXiv Papers
      if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.force_run == 'true') || steps.precheck.outputs.skip_arxiv != 'true' }}
      continue-on-error: true
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || vars.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL }}
        ARXIV_CATEGORIES: ${{ vars.ARXIV_CATEGORIES }}
        ARXIV_MAX_RESULTS: ${{ vars.ARXIV_MAX_RESULTS }}
        ARXIV_FALLBACK_DAYS: ${{ vars.ARXIV_FALLBACK_DAYS }}
        ARXIV_TARGET_DATE: ${{ steps.precheck.outputs.arxiv_fetch_date }}
        ARXIV_OUTPUT_DATE: ${{ steps.precheck.outputs.arxiv_output_date }}
      run: |
        export ARXIV_CATEGORIES="${ARXIV_CATEGORIES:-cs.AI,cs.LG,cs.CL,cs.CV}"
        export ARXIV_MAX_RESULTS="${ARXIV_MAX_RESULTS:-30}"
        export ARXIV_FALLBACK_DAYS="${ARXIV_FALLBACK_DAYS:-3}"
        python scripts/arxiv_papers_to_md.py

    - name: Fetch GitHub Trending
      if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.force_run == 'true') || steps.precheck.outputs.skip_github != 'true' }}
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || vars.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || secrets.PAT_TOKEN || vars.GITHUB_TOKEN || vars.PAT_TOKEN }}
        GITHUB_LANGUAGE: ${{ vars.GITHUB_LANGUAGE }}
        GITHUB_SINCE: ${{ vars.GITHUB_SINCE }}
        GITHUB_MAX_RESULTS: ${{ vars.GITHUB_MAX_RESULTS }}
        GITHUB_TARGET_DATE: ${{ steps.precheck.outputs.github_output_date }}
      run: |
        export GITHUB_SINCE="${GITHUB_SINCE:-daily}"
        export GITHUB_MAX_RESULTS="${GITHUB_MAX_RESULTS:-25}"
        python scripts/github_trending_to_md.py

    - name: Fetch ClawHub Skills
      if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.force_run == 'true') || steps.precheck.outputs.skip_clawhub != 'true' }}
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || vars.OPENAI_API_KEY }}
        OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL }}
        CLAWHUB_TARGET_DATE: ${{ steps.precheck.outputs.clawhub_fetch_date }}
        CLAWHUB_OUTPUT_DATE: ${{ steps.precheck.outputs.clawhub_output_date }}
        CLAWHUB_ALLOW_FALLBACK: ${{ vars.CLAWHUB_ALLOW_FALLBACK }}
        CLAWHUB_MAX_RESULTS: ${{ vars.CLAWHUB_MAX_RESULTS }}
        CLAWHUB_TIMEZONE: ${{ vars.CLAWHUB_TIMEZONE }}
      run: |
        export CLAWHUB_ALLOW_FALLBACK="${CLAWHUB_ALLOW_FALLBACK:-false}"
        export CLAWHUB_MAX_RESULTS="${CLAWHUB_MAX_RESULTS:-25}"
        export CLAWHUB_TIMEZONE="${CLAWHUB_TIMEZONE:-Asia/Singapore}"
        python scripts/clawhub_skills_to_md.py

    - name: Post-check source completeness and quality
      env:
        HAS_OPENAI: ${{ steps.secrets.outputs.has_openai }}
      run: |
        python - <<'PY'
        import os
        from pathlib import Path
        import pandas as pd

        targets = {
            "producthunt": "${{ steps.precheck.outputs.producthunt_output_date }}",
            "arxiv": "${{ steps.precheck.outputs.arxiv_output_date }}",
            "github": "${{ steps.precheck.outputs.github_output_date }}",
            "clawhub": "${{ steps.precheck.outputs.clawhub_output_date }}",
        }
        skip_flags = {
            "producthunt": "${{ steps.precheck.outputs.skip_producthunt }}",
            "arxiv": "${{ steps.precheck.outputs.skip_arxiv }}",
            "github": "${{ steps.precheck.outputs.skip_github }}",
            "clawhub": "${{ steps.precheck.outputs.skip_clawhub }}",
        }

        def score_total(value):
            if isinstance(value, dict):
                return int(value.get("total", 0) or 0)
            return 0

        has_openai = os.getenv("HAS_OPENAI", "false").lower() == "true"
        errors = []
        warnings = []
        for source, date_str in targets.items():
            if str(skip_flags.get(source, "false")).lower() == "true":
                print(f"post-check skip: {source} ({date_str})")
                continue
            parquet_path = Path("data/structured") / f"{date_str}.parquet"
            if not parquet_path.exists():
                # arXiv 网络超时属于软失败，不阻断整个 workflow
                if source == "arxiv":
                    warnings.append(f"WARN: {source} {date_str}: parquet missing (network timeout?), skipping")
                else:
                    errors.append(f"{source} {date_str}: parquet missing")
                continue
            try:
                df = pd.read_parquet(parquet_path)
            except Exception as exc:
                errors.append(f"{source} {date_str}: read parquet failed ({exc})")
                continue
            if "source" not in df.columns:
                errors.append(f"{source} {date_str}: source column missing")
                continue
            src_df = df[df["source"].astype(str).str.lower() == source]
            if src_df.empty:
                if source == "clawhub":
                    md_path = Path("data/clawhub") / f"clawhub-daily-{date_str}.md"
                    if md_path.exists():
                        try:
                            md_text = md_path.read_text(encoding="utf-8")
                        except Exception:
                            md_text = ""
                        if "> 共 0 个 skills" in md_text:
                            print(f"post-check accept: clawhub {date_str} has 0 skills")
                            continue
                # arXiv 空数据也是软失败
                if source == "arxiv":
                    warnings.append(f"WARN: {source} {date_str}: no rows (possible timeout)")
                else:
                    errors.append(f"{source} {date_str}: no rows")
                continue
            if "score" not in src_df.columns:
                errors.append(f"{source} {date_str}: score column missing")
                continue
            if has_openai and not src_df["score"].apply(score_total).gt(0).any():
                # 429 rate limit 导致评分全0，降级为 warning
                warnings.append(f"WARN: {source} {date_str}: all scores are 0 (possible OpenAI rate limit)")

        for w in warnings:
            print(w)
        if errors:
            print("Post-check failed:")
            for err in errors:
                print(" -", err)
            raise SystemExit(1)

        print("Post-check passed for all sources.")
        PY

    - name: Generate Keyword Trends
      run: |
        python scripts/keyword_trends.py

    - name: Commit files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .
        git commit -m "Generated daily multi-source data" || echo "No changes to commit"

    - name: Push changes
      run: |
        BRANCH="${{ github.ref_name }}"
        REMOTE_URL="https://${{ secrets.PAT }}@github.com/${{ github.repository }}.git"
        BASE_SHA="${{ github.sha }}"
        LOCAL_HEAD="$(git rev-parse HEAD)"

        if [ "${LOCAL_HEAD}" = "${BASE_SHA}" ]; then
          echo "No new commit to push."
          exit 0
        fi

        if git push "${REMOTE_URL}" "HEAD:${BRANCH}"; then
          exit 0
        fi

        echo "Initial push failed, checking whether remote advanced during this run..."
        git fetch "${REMOTE_URL}" "${BRANCH}"
        REMOTE_HEAD="$(git rev-parse FETCH_HEAD)"

        if [ "${REMOTE_HEAD}" != "${BASE_SHA}" ]; then
          echo "Remote branch advanced during workflow run:"
          echo "  workflow base: ${BASE_SHA}"
          echo "  current remote: ${REMOTE_HEAD}"
          echo "Skipping push to avoid rebasing generated files with same-day conflicts."
          exit 0
        fi

        echo "Remote did not advance; retrying push for transient failure..."
        for i in 1 2 3; do
          git push "${REMOTE_URL}" "HEAD:${BRANCH}" && exit 0
          echo "Push failed on retry ${i}, sleeping..."
          sleep 5
        done
        echo "Push failed after retries."
        exit 1

    - name: Sync to production repo (garyz13intheloop/creekstone-daily-feeds)
      env:
        PROD_PAT: ${{ secrets.PROD_PAT }}
        PAT: ${{ secrets.PAT }}
      run: |
        TOKEN="${PROD_PAT:-$PAT}"
        for i in 1 2 3; do
          git push "https://${TOKEN}@github.com/garyz13intheloop/creekstone-daily-feeds.git" "HEAD:main" \
            && echo "Synced to production repo." && exit 0
          echo "Sync attempt ${i} failed, retrying..."
          sleep 5
        done
        echo "Sync to production repo failed after retries."
        exit 1
